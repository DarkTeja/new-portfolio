<section id="skills" class="skills-section">
  <div class="skills-wrapper">

    <h2 class="skills-title">Tech Arsenal</h2>

    <!-- ROW 1 : 5 -->
    <div class="skills-row row-5">
      <div class="skill-card" *ngFor="let s of skillsRow1">
        <img [src]="s.icon" [alt]="s.name" />
        <span>{{ s.name }}</span>
      </div>
    </div>

    <!-- ROW 2 : 4 -->
    <div class="skills-row row-4">
      <div class="skill-card" *ngFor="let s of skillsRow2">
        <img [src]="s.icon" [alt]="s.name" />
        <span>{{ s.name }}</span>
      </div>
    </div>

    <!-- ROW 3 : 3 -->
    <div class="skills-row row-3">
      <div class="skill-card" *ngFor="let s of skillsRow3">
        <img [src]="s.icon" [alt]="s.name" />
        <span>{{ s.name }}</span>
      </div>
    </div>

  </div>
</section>
